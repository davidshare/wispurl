name: Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  gitleaks:
    name: Detect hardcoded secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          # Full history is required so gitleaks can scan all commits,
          # not just the latest. Without this it only sees one commit.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set GITLEAKS_LICENSE if you have a paid license
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}